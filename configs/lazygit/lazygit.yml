gui:
  sidePanelWidth: 0.3
  expandFocusedSidePanel: true
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#a6e3a1"
      - bold
    inactiveBorderColor:
      - grey
    searchingActiveBorderColor:
      - cyan
      - bold
    optionsTextColor:
      - white
    selectedLineBgColor:
      - "#503a5c" # Use `purpleLighter` color to make it readable
    cherryPickedCommitBgColor:
      - cyan
    cherryPickedCommitFgColor:
      - blue
    markedBaseCommitBgColor:
      - yellow
    markedBaseCommitFgColor:
      - blue
    unstagedChangesColor:
      - white
    defaultFgColor:
      - default
  showRandomTip: false
  showCommandLog: false
git:
  parseEmoji: true
  commit:
    autoWrapCommitMessage: true
    autoWrapWidth: 72
  pagers:
    - colorArg: always
      pager: delta --dark --paging=never --line-numbers --syntax-theme=Nord
keybinding:
  files:
    commitChangesWithEditor: <disabled>
os:
  editPreset: "vscode"
  open: "open {{filename}}"
customCommands:
  - key: "C"
    context: "files"
    description: "Generate commit message with Claude"
    command: "git diff --staged | CLAUDECODE= MAX_THINKING_TOKENS=0 claude -p 'Generate a concise git commit message for these staged changes. Output ONLY the raw commit message with no markdown, no code blocks, no backticks, no explanations. Use conventional commit format.' --model haiku --no-session-persistence --tools='' --disable-slash-commands --setting-sources='' --system-prompt='' --output-format text > /tmp/commit_msg && GIT_EDITOR=vim git commit -e -F /tmp/commit_msg"
    output: terminal
